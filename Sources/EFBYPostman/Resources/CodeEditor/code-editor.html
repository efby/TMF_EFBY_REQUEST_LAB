<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body, #editor {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1e1e1e;
      color: rgba(255, 255, 255, 0.96);
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    }

    body {
      -webkit-font-smoothing: antialiased;
    }

    .ace_editor {
      background: #1e1e1e;
      color: rgba(212, 212, 212, 0.98);
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-variant-ligatures: none;
    }

    .ace_editor.ace_autocomplete {
      background: #262626;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    .ace_editor.ace_autocomplete .ace_line {
      padding: 0 8px;
    }
  </style>
  <script src="ace/ace.js"></script>
  <script src="ace/ext-language_tools.js"></script>
  <script src="ace/theme-tomorrow_night.js"></script>
  <script src="ace/mode-text.js"></script>
  <script src="ace/mode-json.js"></script>
  <script src="ace/mode-javascript.js"></script>
  <script src="ace/mode-xml.js"></script>
  <script src="ace/mode-html.js"></script>
</head>
<body>
  <div id="editor"></div>

  <script>
    (function() {
      ace.config.set("basePath", "ace");
      ace.config.set("modePath", "ace");
      ace.config.set("themePath", "ace");
      ace.config.set("workerPath", "ace");
      ace.config.set("loadWorkerFromBlob", false);
      const AceRange = ace.require("ace/range").Range;

      const editor = ace.edit("editor", {
        theme: "ace/theme/tomorrow_night",
        mode: "ace/mode/text",
        showPrintMargin: false,
        highlightActiveLine: true,
        enableBasicAutocompletion: true,
        enableLiveAutocompletion: true,
        enableSnippets: false
      });

      const session = editor.session;
      let state = {
        text: "",
        fontSize: 13,
        language: "plainText",
        showsLineNumbers: false,
        isEditable: true,
        tabWidth: 4,
        scrollTop: 0,
        autocomplete: { topLevelSuggestions: [], nestedSuggestions: {} },
        selectEntireDocumentOnClick: false
      };
      var suppressChange = false;
      var suppressScrollEvent = false;

      editor.$blockScrolling = Infinity;
      editor.renderer.setPadding(10);
      editor.renderer.setScrollMargin(16, 16, 0, 0);
      editor.setHighlightSelectedWord(true);
      editor.setAnimatedScroll(false);
      editor.setBehavioursEnabled(true);
      editor.setDisplayIndentGuides(true);
      editor.setShowPrintMargin(false);
      editor.setShowInvisibles(false);
      editor.setOption("useSoftTabs", true);
      editor.setOption("scrollPastEnd", 0.1);
      session.setUseWorker(false);
      session.setUseWrapMode(true);

      function notify(type, payload) {
        if (!window.webkit || !window.webkit.messageHandlers || !window.webkit.messageHandlers.codeEditor) {
          return;
        }

        const message = Object.assign({ type: type }, payload || {});
        window.webkit.messageHandlers.codeEditor.postMessage(message);
      }

      function normalizeSmartPunctuation(value) {
        return String(value || "")
          .replace(/[\u2018\u2019\u201A\u201B\u2032\u2035]/g, "'")
          .replace(/[\u201C\u201D\u201E\u201F\u2033\u2036]/g, '"');
      }

      function languageSupportsFolding(language) {
        return ["javascript", "json", "xml", "html"].includes(language);
      }

      function aceModeForLanguage(language) {
        switch (language) {
        case "json":
          return "ace/mode/json";
        case "javascript":
          return "ace/mode/javascript";
        case "xml":
          return "ace/mode/xml";
        case "html":
          return "ace/mode/html";
        case "markdown":
          return "ace/mode/text";
        default:
          return "ace/mode/text";
        }
      }

      function currentTextBeforeCursor() {
        const position = editor.getCursorPosition();
        const lines = session.getDocument().getAllLines().slice(0, position.row);
        lines.push((session.getLine(position.row) || "").slice(0, position.column));
        return lines.join("\n");
      }

      function trailingCompletionToken(text) {
        const match = text.match(/[A-Za-z_$][A-Za-z0-9_$]*(?:\.[A-Za-z_$][A-Za-z0-9_$]*)*\.?$/);
        return match ? match[0] : "";
      }

      function completionDetails() {
        const position = editor.getCursorPosition();
        const line = session.getLine(position.row) || "";
        const beforeCursor = line.slice(0, position.column);
        const token = trailingCompletionToken(beforeCursor);
        if (!token) {
          return null;
        }

        const parts = token.split(".");
        const endsWithDot = token.endsWith(".");
        let scopePath = "";
        let partial = "";

        if (endsWithDot) {
          scopePath = token.slice(0, -1);
        } else if (parts.length > 1) {
          scopePath = parts.slice(0, -1).join(".");
          partial = parts[parts.length - 1];
        } else {
          partial = parts[0];
        }

        const partialStartColumn = position.column - partial.length;
        return {
          position: position,
          scopePath: scopePath,
          partial: partial,
          partialStartColumn: partialStartColumn
        };
      }

      function completionCandidates() {
        const details = completionDetails();
        if (!details) {
          return [];
        }

        const context = state.autocomplete || { topLevelSuggestions: [], nestedSuggestions: {} };
        const candidates = details.scopePath
          ? (context.nestedSuggestions[details.scopePath] || [])
          : (context.topLevelSuggestions || []);
        const loweredPartial = details.partial.toLowerCase();

        return candidates.filter(function(candidate) {
          return !loweredPartial || candidate.toLowerCase().startsWith(loweredPartial);
        });
      }

      function normalizeEditorIfNeeded() {
        const originalValue = editor.getValue();
        const normalizedValue = normalizeSmartPunctuation(originalValue);
        if (normalizedValue === originalValue) {
          return false;
        }

        const selection = editor.selection.toJSON();
        suppressChange = true;
        editor.setValue(normalizedValue, -1);
        editor.selection.fromJSON(selection);
        suppressChange = false;
        return true;
      }

      function applyOptions() {
        session.setMode(aceModeForLanguage(state.language));
        session.setTabSize(Math.max(1, state.tabWidth || 4));
        session.setUseSoftTabs(true);
        session.setUseWrapMode(true);
        session.setUseWorker(false);
        editor.setReadOnly(!state.isEditable);
        editor.setFontSize(state.fontSize);
        editor.setOption("showLineNumbers", !!state.showsLineNumbers);
        editor.setOption("showFoldWidgets", languageSupportsFolding(state.language));
        editor.setOption("foldStyle", languageSupportsFolding(state.language) ? "markbeginend" : "manual");
        editor.renderer.setShowGutter(!!state.showsLineNumbers || languageSupportsFolding(state.language));
      }

      const contextualCompleter = {
        // Do not include "." here: Ace uses this prefix to filter suggestions. If the prefix were
        // "pm.request", captions like "headers" would be dropped. Match only the trailing identifier
        // segment so filtering applies to "headers" / "request" / "AesUtils" etc. while we still parse
        // the full dotted path in completionDetails() from the current line.
        identifierRegexps: [/[A-Za-z0-9_$]/],
        getCompletions: function(editorInstance, currentSession, position, prefix, callback) {
          if (!state.isEditable) {
            callback(null, []);
            return;
          }

          const completions = completionCandidates().slice(0, 64).map(function(item) {
            return {
              caption: item,
              value: item,
              meta: "context",
              score: 1000
            };
          });
          callback(null, completions);
        },
        insertMatch: function(editorInstance, data) {
          const details = completionDetails();
          const value = String((data && (data.value || data.caption)) || "");
          if (!details || !value.length) {
            return;
          }

          const replacementRange = new AceRange(
            details.position.row,
            details.partialStartColumn,
            details.position.row,
            details.position.column
          );

          editorInstance.session.replace(replacementRange, value);
          editorInstance.moveCursorTo(details.position.row, details.partialStartColumn + value.length);
          editorInstance.clearSelection();
        }
      };

      editor.completers = [contextualCompleter];

      editor.commands.on("afterExec", function(event) {
        if (!state.isEditable || !event || !event.command) {
          return;
        }

        if (event.command.name === "insertstring" && typeof event.args === "string") {
          if (/^[A-Za-z_.$]$/.test(event.args)) {
            editor.execCommand("startAutocomplete");
          }
          return;
        }

        if (event.command.name === "backspace" || event.command.name === "del") {
          editor.execCommand("startAutocomplete");
        }
      });

      session.on("change", function() {
        if (normalizeEditorIfNeeded()) {
          return;
        }

        if (!suppressChange) {
          notify("change", { text: editor.getValue() });
        }
      });

      session.on("changeScrollTop", function(scrollTop) {
        if (suppressScrollEvent) {
          return;
        }
        notify("scroll", { scrollTop: scrollTop });
      });

      const textInput = editor.textInput.getElement();
      textInput.setAttribute("autocorrect", "off");
      textInput.setAttribute("autocapitalize", "off");
      textInput.setAttribute("autocomplete", "off");
      textInput.setAttribute("spellcheck", "false");
      textInput.setAttribute("data-gramm", "false");
      textInput.setAttribute("data-gramm_editor", "false");
      textInput.setAttribute("data-enable-grammarly", "false");

      textInput.addEventListener("beforeinput", function(event) {
        if (!state.isEditable || typeof event.data !== "string" || !event.data.length) {
          return;
        }

        const normalizedData = normalizeSmartPunctuation(event.data);
        if (normalizedData === event.data) {
          return;
        }

        event.preventDefault();
        editor.session.replace(editor.getSelectionRange(), normalizedData);
      });

      editor.on("mousedown", function(e) {
        if (!state.selectEntireDocumentOnClick || !state.isEditable) {
          return;
        }
        if (e && typeof e.button === "number" && e.button !== 0) {
          return;
        }
        window.setTimeout(function() {
          try {
            editor.selectAll();
            editor.focus();
          } catch (err) {}
        }, 0);
      });

      window.CodeEditorBridge = {
        setState: function(nextState) {
          const scrollTopBeforeUpdate = session.getScrollTop();
          state = Object.assign({}, state, nextState || {});
          applyOptions();

          const nextText = String(state.text || "");
          if (editor.getValue() !== nextText) {
            const cursor = editor.getCursorPosition();
            suppressChange = true;
            editor.setValue(nextText, -1);
            suppressChange = false;

            const targetRow = Math.min(cursor.row, Math.max(0, session.getLength() - 1));
            const targetColumn = Math.min(cursor.column, (session.getLine(targetRow) || "").length);
            editor.moveCursorTo(targetRow, targetColumn);
            editor.clearSelection();
          }

          const targetScrollTop = typeof state.scrollTop === "number"
            ? state.scrollTop
            : scrollTopBeforeUpdate;
          const currentScrollTop = session.getScrollTop();
          if (Math.abs(currentScrollTop - targetScrollTop) > 1) {
            suppressScrollEvent = true;
            session.setScrollTop(targetScrollTop);
            window.setTimeout(function() {
              suppressScrollEvent = false;
            }, 0);
          }
        }
      };

      notify("ready");
    })();
  </script>
</body>
</html>
