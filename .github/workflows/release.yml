name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-dmg:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build release binary
        run: swift build -c release --product EfbyRequestLabs

      - name: Build DMG (unsigned)
        run: ./Tools/build_dmg.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Distribution/EFBYRequestLab.dmg
          generate_release_notes: true
