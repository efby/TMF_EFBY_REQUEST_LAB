name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-and-package:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6.3)
        run: |
          for app in \
            /Applications/Xcode_26.5.app \
            /Applications/Xcode_26.4.1.app \
            /Applications/Xcode_26.4.app \
            /Applications/Xcode.app
          do
            if [ -d "$app" ]; then
              sudo xcode-select -s "$app"
              break
            fi
          done
          xcodebuild -version
          swift --version
          swift --version | grep -q 'Swift version 6\.[3-9]'

      - name: Resolve packages
        run: swift package resolve

      - name: Run tests
        run: swift test

      - name: Build DMG
        run: ./Tools/build_dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: EFBYRequestLab-dmg
          path: Distribution/EFBYRequestLab.dmg
          if-no-files-found: error
          retention-days: 14
